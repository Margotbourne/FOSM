{% extends "base.html" %}

{% block content %}


<div class="mission-grid3">
    {% for photo in photos %}
        <div class="grid-item gallery-tile">
            <img src="{{ url_for('static', filename='gallery_uploads/' + photo.filename) }}">
            <div class="photo-overlay">
                <p>{{ photo.title }}</p>
            </div>
        </div>
    {% else %}
        <div class="empty-gallery-state">
            <h3>No photos uploaded yet</h3>
            <p>Please check back later to see our community impact.</p>
        </div>
    {% endfor %}
</div>
{% endblock %}
