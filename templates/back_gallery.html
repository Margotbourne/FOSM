{% extends "base.html" %}

{% block content %}
<div class="need-wrapper">
    <section class="need-header">
        <h1>Gallery Management</h1>
        <p>Upload new photos or remove existing ones from the community gallery.</p>

        <form action="{{ url_for('upload_photo') }}" method="POST" enctype="multipart/form-data" class="upload-form">
            <div class="form-group">
                <label>Photo Title</label>
                <input type="text" name="title" placeholder="e.g., New Well in Udaipur" required>
            </div>
            
            <div class="form-group">
                <label>Select Image</label>
                <input type="file" name="photo" accept="image/*" required>
            </div>

            <button type="submit" class="btn-primary">Upload to Gallery</button>
        </form>

        <hr style="margin: 40px 0; border: 1px solid #3a4d2f; opacity: 0.2;">

        <h2>Existing Photos</h2>
        <div class="mission-grid3">
            {% for photo in photos %}
                <div class="gallery-tile admin-tile">
                    <img src="{{ url_for('static', filename='gallery_uploads/' + photo.filename) }}">
                    
                    <form action="{{ url_for('delete_photo', id=photo.id) }}" method="POST" class="delete-overlay">
                        <button type="submit" class="delete-btn" onclick="return confirm('Are you sure you want to delete this?')">
                            Delete
                        </button>
                    </form>
                </div>
            {% else %}
                <div class="empty-gallery-state">
                    <p>No photos to manage.</p>
                </div>
            {% endfor %}
        </div>
    </section>
</div>
{% endblock %}
